version: 1

project:
  name: ai-memory-orchestrator
  type: python-cli
  language: [python]
  package_manager: pip
  test_runner: pytest

memory:
  source_of_truth: .ai
  canonical_files:
    - .ai/manifest.yaml
    - .ai/state.md
    - .ai/decisions.md
    - .ai/tasks.md
    - .ai/tests.md
    - .ai/graph.md

runtime:
  path: .ai/runtime
  gitignored: true

indexes:
  path: .ai/machine
  versioned: true

context:
  default_profile: quick
  profiles:
    micro: { max_tokens: 1200 }
    quick: { max_tokens: 3000 }
    debug: { max_tokens: 8000 }
    architecture: { max_tokens: 12000 }
    handoff: { max_tokens: 2500 }
    full: { max_tokens: 20000 }

scan:
  excludes:
    - .git
    - .venv
    - node_modules
    - dist
    - build
    - .ai/runtime

server:
  host: 127.0.0.1
  port: 8787

obsidian:
  enabled: false
  mode: export-only
  path: .obsidian/project-memory

validators:
  drift: { enabled: true }
  artifact_hygiene: { enabled: true }
  broken_references: { enabled: true }
  stale_context: { enabled: true }
  unsafe_instructions: { enabled: true }
